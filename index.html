        <div class="back-btn" onclick="goBack()">← Back</div>

</div>

<script>

        ]
    },
    "@kate_science_lab": {

        ]
    },
    "@maria_news": {

        bio: "Your favourite journalist 📰😘❤️💕",
        followers: "1.3mln",

        posts: [
            {img: "photos/maria_post1.jpg", desc: "WHICH ONE OF YOU GOT MY REAL NAME AND DATE OF BIRTH???<br> IM COMING FOR YOU", likes: "85.2k", date: "1998-09-14 13:47"},
            {img: "photos/maria_post2.jpg", desc: "Anyway, new account! Your favourite journalist is back 😘😘😘", likes: "101.5k", date: "1998-09-14 13:51"}
        ]
    },
    "@policeman_arthur": {
        avatar: "photos/arthur_post1.jpg",
        bio: "Raccoon Police Department Officer 🚓👮‍♂️🫡",
        followers: 1245,
        following: "15.3k",
        posts: [
            {img: "photos/arthur_post1.jpg", desc: "New account.<br> But how did you know my special order with the exact amount of milk I use?", likes: 120, date: "1998-09-14 12:33"},
            {img: "photos/arthur_post2.jpg", desc: "Guys, you need to stop using your pet names and it's date of birth for passwords. <br> Any objects and numbers really.", likes: 552, date: "1998-09-15 10:21", comments: [

            ]}
        ]
    },
    "@granny_donna": {
        avatar: "photos/donna_post1.jpg",
        bio: "Hello, I'm granny Donna. 🙂",
        followers: "83.9k",
        following: 5,
        posts: [
            {img: "photos/donna_post1.jpg", desc: "New account", likes: "5.7k", date: "1998-09-15 10:15"},
            {img: "photos/donna_post2.jpg", desc: "For the people asking what happend, the police came and said that I've been 'hacked'. My password was apparently too weak, but the nice policeman helped me with the new password. ☺️", likes: "7.2k", date: "1998-09-15 11:34"}
        ]
    }
};

const profileListDiv = document.getElementById("profileList");
const profileViewDiv = document.getElementById("profileView");
const profileInfoDiv = document.getElementById("profileInfo");
const feedDiv = document.getElementById("feed");

function renderList() {
    profileListDiv.innerHTML = "";

    Object.keys(data).forEach(name => {
        const user = data[name];

        const card = document.createElement("div");
        card.className = "profile-card";

        card.innerHTML = `
            <img src="${user.avatar}">
            <div>
                <div><b>${name}</b></div>
                <div>${user.bio}</div>
            </div>
        `;

        card.onclick = () => openProfile(name);

        profileListDiv.appendChild(card);
    });
}

function openProfile(userName) {
    const profile = data[userName];

    profileListDiv.style.display = "none";
    profileViewDiv.style.display = "block";

    profileInfoDiv.innerHTML = `
        <div class="profile-info">
            <div class="profile-row">
                <img src="${profile.avatar}">
                
                <div class="profile-details">
                    <div class="profile-name">${userName}</div>
                    <div class="bio">${profile.bio}</div>

                    <div class="profile-stats">
                        <div><b>${profile.posts.length}</b> posts</div>
                        <div><b>${profile.followers}</b> followers</div>
                        <div><b>${profile.following}</b> following</div>
                    </div>
                </div>
            </div>
        </div>
    `;

    feedDiv.innerHTML = "";
    profile.posts.forEach(post => {
        const postDiv = document.createElement("div");
        postDiv.className = "post";

        let commentsHTML = "";
        if (post.comments) {
            post.comments.forEach(c => {
                commentsHTML += `<div class="comment"><b>${c.user}</b> ${c.text}</div>`;
            });
        }

        postDiv.innerHTML = `
            <div class="post-header">
                ${userName}
                <div class="date">${post.date}</div>
            </div>
            <img src="${post.img}">
            <div class="post-content">
                <div class="likes">${post.likes} likes</div>
                <div>${post.desc}</div>
                ${commentsHTML}
            </div>
        `;

    feedDiv.appendChild(postDiv);
    });
}

function goBack() {
    profileViewDiv.style.display = "none";
    profileListDiv.style.display = "block";
}

renderList();
</script>

</body>
</html>
