<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Fake Instagram</title>
<style>
body {
    font-family: Arial;
    background: #fafafa;
    margin: 0;
}

.container {
    max-width: 500px;
    margin: auto;
}

/* LISTA PROFILI */
.profile-list {
    padding: 10px;
}

.profile-card {
    background: white;
    padding: 10px;
    margin: 10px 0;
    display: flex;
    align-items: center;
    gap: 10px;
    border-radius: 10px;
    cursor: pointer;
}

.profile-card img {
    width: 50px;
    height: 50px;
    border-radius: 50%;
}

/* PROFIL */
.profile-info {
    background: white;
    padding: 15px;
    border-bottom: 1px solid #ddd;
}

.profile-top {
    display: flex;
    gap: 15px;
    align-items: center;
}

.profile-top img {
    width: 70px;
    height: 70px;
    border-radius: 50%;
}

.profile-stats {
    display: flex;
    gap: 15px;
}

.profile-name {
    font-weight: bold;
}

.bio {
    margin-top: 10px;
}

/* POST */
.post {
    background: white;
    margin: 20px 0;
    border: 1px solid #ddd;
    border-radius: 10px;
}

.post-header {
    padding: 10px;
    font-weight: bold;
}

.post img {
    width: 100%;
}

.post-content {
    padding: 10px;
}

.likes {
    font-weight: bold;
}

/* BACK BUTTON */
.back-btn {
    margin: 10px;
    cursor: pointer;
    color: #3897f0;
    font-weight: bold;
}

.comment {
    margin-top: 5px;
    font-size: 0.9em;
}

.logo {
    display: flex;
    justify-content: center;
}

.logo img {
    height: 100px;
}
</style>
</head>
<body>

<div class="container">
    
    <div class="logo">
        <img src="logo.png" alt="logo">
    </div>

    <!-- LISTA PROFILI -->
    <div id="profileList" class="profile-list"></div>

    <!-- WIDOK PROFILU -->
    <div id="profileView" style="display:none;">
        <div class="back-btn" onclick="goBack()">← Powrót</div>
        <div id="profileInfo"></div>
        <div id="feed"></div>
    </div>

</div>

<script>
const data = {
    "Anna": {
        avatar: "https://i.pravatar.cc/100?img=1",
        bio: "✈️ Podróże | 📍 Świat",
        followers: 1200,
        following: 300,
        posts: [
            {img: "https://picsum.photos/500?1", desc: "Włochy ❤️", likes: 120},
            {img: "https://picsum.photos/500?2", desc: "Kawa ☕", likes: 45, comments: [
                {user: "Jan", text: "Ale super! 🔥"},
                {user: "Kasia", text: "Zazdro 😍"}
            ]}
        ]
    },
    "Jan": {
        avatar: "https://i.pravatar.cc/100?img=2",
        bio: "💪 Fitness",
        followers: 980,
        following: 150,
        posts: [
            {img: "https://picsum.photos/500?3", desc: "Trening 💪", likes: 88}
        ]
    },
    "Kasia": {
        avatar: "https://i.pravatar.cc/100?img=3",
        bio: "✨ Lifestyle",
        followers: 1500,
        following: 400,
        posts: [
            {img: "https://picsum.photos/500?4", desc: "OOTD ✨", likes: 67}
        ]
    },
    "Michał": {
        avatar: "https://i.pravatar.cc/100?img=4",
        bio: "💻 Tech",
        followers: 2000,
        following: 500,
        posts: [
            {img: "https://picsum.photos/500?5", desc: "Setup 💻", likes: 150}
        ]
    },
    "Ola": {
        avatar: "logo.png",
        bio: "📷 Fotografia",
        followers: 1700,
        following: 350,
        posts: [
            {img: "https://picsum.photos/500?6", desc: "Zdjęcie dnia 📷", likes: 99}
        ]
    }
};

const profileListDiv = document.getElementById("profileList");
const profileViewDiv = document.getElementById("profileView");
const profileInfoDiv = document.getElementById("profileInfo");
const feedDiv = document.getElementById("feed");

// render listy
function renderList() {
    profileListDiv.innerHTML = "";

    Object.keys(data).forEach(name => {
        const user = data[name];

        const card = document.createElement("div");
        card.className = "profile-card";

        card.innerHTML = `
            <img src="${user.avatar}">
            <div>
                <div><b>${name}</b></div>
                <div>${user.bio}</div>
            </div>
        `;

        card.onclick = () => openProfile(name);

        profileListDiv.appendChild(card);
    });
}

// otwarcie profilu
function openProfile(userName) {
    const profile = data[userName];

    profileListDiv.style.display = "none";
    profileViewDiv.style.display = "block";

    profileInfoDiv.innerHTML = `
        <div class="profile-info">
            <div class="profile-top">
                <img src="${profile.avatar}">
                <div class="profile-stats">
                    <div><b>${profile.posts.length}</b> posty</div>
                    <div><b>${profile.followers}</b> obserwujący</div>
                    <div><b>${profile.following}</b> obserwowani</div>
                </div>
            </div>
            <div class="profile-name">${userName}</div>
            <div class="bio">${profile.bio}</div>
        </div>
    `;

    feedDiv.innerHTML = "";
    profile.posts.forEach(post => {
        const postDiv = document.createElement("div");
        postDiv.className = "post";

        // generowanie komentarzy
        let commentsHTML = "";
        if (post.comments) {
            post.comments.forEach(c => {
                commentsHTML += `<div class="comment"><b>${c.user}</b> ${c.text}</div>`;
            });
        }

        postDiv.innerHTML = `
            <div class="post-header">${userName}</div>
            <img src="${post.img}">
            <div class="post-content">
                <div class="likes">${post.likes} polubień</div>
                <div>${post.desc}</div>
                ${commentsHTML}
            </div>
        `;

    feedDiv.appendChild(postDiv);
    });
}

// powrót
function goBack() {
    profileViewDiv.style.display = "none";
    profileListDiv.style.display = "block";
}

renderList();
</script>

</body>
</html>
