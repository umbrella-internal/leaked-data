const profileListDiv = document.getElementById("profileList");
const profileViewDiv = document.getElementById("profileView");
const profileInfoDiv = document.getElementById("profileInfo");
const feedDiv = document.getElementById("feed");

function renderList() {
    profileListDiv.innerHTML = "";

    Object.keys(data).forEach(name => {
        const user = data[name];

        const card = document.createElement("div");
        card.className = "profile-card";

        card.innerHTML = `
            <img src="${user.avatar}">
            <div>
                <div><b>${name}</b></div>
                <div>${user.bio}</div>
            </div>
        `;

        card.onclick = () => openProfile(name);

        profileListDiv.appendChild(card);
    });
}

function openProfile(userName) {
    const profile = data[userName];

    profileListDiv.style.display = "none";
    profileViewDiv.style.display = "block";

    profileInfoDiv.innerHTML = `
        <div class="profile-info">
            <div class="profile-row">
                <img src="${profile.avatar}">
                
                <div class="profile-details">
                    <div class="profile-name">${userName}</div>
                    <div class="bio">${profile.bio}</div>

                    <div class="profile-stats">
                        <div><b>${profile.posts.length}</b> posts</div>
                        <div><b>${profile.followers}</b> followers</div>
                        <div><b>${profile.following}</b> following</div>
                    </div>
                </div>
            </div>
        </div>
    `;

    feedDiv.innerHTML = "";
    profile.posts.forEach(post => {
        const postDiv = document.createElement("div");
        postDiv.className = "post";

        let commentsHTML = "";
        if (post.comments) {
            post.comments.forEach(c => {
                commentsHTML += `<div class="comment"><b>${c.user}</b> ${c.text}</div>`;
            });
        }

        postDiv.innerHTML = `
            <div class="post-header">
                ${userName}
                <div class="date">${post.date}</div>
            </div>
            <img src="${post.img}">
            <div class="post-content">
                <div class="likes">${post.likes} likes</div>
                <div>${post.desc}</div>
                ${commentsHTML}
            </div>
        `;

    feedDiv.appendChild(postDiv);
    });

    feedDiv.innerHTML += `
        <div class="glitch" data-text="ERROR_404">ERROR_404</div>
        <div class="glow">ERROR_404</div>
    `;
}

function goBack() {
    profileViewDiv.style.display = "none";
    profileListDiv.style.display = "block";
